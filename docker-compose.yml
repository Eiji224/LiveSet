services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./laravel:/var/www
    depends_on:
      - laravel-app
      - fastapi
    networks:
      - liveset-network

  laravel-app:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    command: sh -c "php artisan migrate --force && php-fpm"
    volumes:
      - ./laravel:/var/www
    env_file:
      - ./laravel/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - liveset-network

  laravel-redis-subscriber:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: laravel_redis_subscriber
    restart: unless-stopped
    command: php artisan redis:subscribe
    volumes:
      - ./laravel:/var/www
    depends_on:
      - redis
      - laravel-app
    networks:
      - liveset-network
    
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    env_file: ./fastapi/.env
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - liveset-network
    
  
  db:
    image: mysql:8
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - liveset-network
  
  redis:
    image: redis:latest
    container_name: redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - liveset-network
  
volumes:
  mysql_data:
  redis_data:

networks:
  liveset-network:
    driver: bridge